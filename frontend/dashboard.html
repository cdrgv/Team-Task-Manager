<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Team Task Manager</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <h2>Team Task Manager</h2>
        <div class="nav-links">
            <a href="dashboard.html" class="nav-link active">Dashboard</a>
            <a href="projects.html" class="nav-link">Projects</a>
            <a href="tasks.html" class="nav-link">Tasks</a>
            <button id="logoutBtn" class="logout-btn">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Tasks</h3>
                <span id="totalTasks">0</span>
            </div>
            <div class="stat-card">
                <h3>Pending</h3>
                <span id="pendingTasks">0</span>
            </div>
            <div class="stat-card">
                <h3>In Progress</h3>
                <span id="inProgressTasks">0</span>
            </div>
            <div class="stat-card">
                <h3>Completed</h3>
                <span id="completedTasks">0</span>
            </div>
        </div>

        <div class="overdue-section">
            <h3>Overdue Tasks</h3>
            <div id="overdueTasks" class="task-list"></div>
        </div>
    </div>
    <script src="js/dashboard.js"></script>
</body>
</html>
