<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks - Team Task Manager</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <h2>Team Task Manager</h2>
        <div class="nav-links">
            <a href="dashboard.html" class="nav-link">Dashboard</a>
            <a href="projects.html" class="nav-link">Projects</a>
            <a href="tasks.html" class="nav-link active">Tasks</a>
            <button id="logoutBtnTasks" class="logout-btn">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="header-section">
            <h2>My Tasks</h2>
            <button id="addTaskBtn" class="add-btn">+ New Task</button>
        </div>

        <div id="taskForm" class="form-overlay" style="display: none;">
            <div class="form-container">
                <h3 id="taskFormTitle">Add Task</h3>
                <form id="taskFormElement">
                    <input type="hidden" id="taskId">
                    <select id="taskProject" required>
                        <option value="">Select Project</option>
                    </select>
                    <input type="text" id="taskTitle" placeholder="Task Title *" required>
                    <textarea id="taskDesc" placeholder="Description"></textarea>
                    <input type="email" id="assignEmail" placeholder="Assign to (email)">
                    <input type="date" id="dueDate">
                    <select id="taskStatus">
                        <option value="pending">Pending</option>
                        <option value="in-progress">In Progress</option>
                        <option value="completed">Completed</option>
                    </select>
                    <div class="form-actions">
                        <button type="submit" style="background: #667eea; color: white; padding: 12px; font-size: 16px;">💾 Save Task</button>
                        <button type="button" id="cancelTask" style="background: #ddd; color: #666;">Cancel</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="status-tabs">
            <button class="tab-btn active" data-status="all">All</button>
            <button class="tab-btn" data-status="pending">Pending</button>
            <button class="tab-btn" data-status="in-progress">In Progress</button>
            <button class="tab-btn" data-status="completed">Completed</button>
        </div>

        <div id="tasksList" class="task-list"></div>
    </div>
    <script src="js/tasks.js"></script>
</body>
</html>
